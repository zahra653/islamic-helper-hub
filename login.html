<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #f4f6fb;
}

.box {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 300px;
    text-align: center;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
}

button {
    padding: 10px;
    background: #2a5298;
    color: white;
    border: none;
    width: 100%;
}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>

<input type="text" id="username" placeholder="Enter your name">
<button onclick="login()">Enter</button>

</div>

<script>
function login(){
let name = document.getElementById("username").value;

if(name == ""){
alert("Please enter your name");
return;
}

localStorage.setItem("user", name);

window.location.href = "index.html";
}
</script>

</body>
</html>
